<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Parking - FindMySpot</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/search.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Add this BEFORE your custom script -->


<!-- Include your main JS script after -->
<script src="your-script.js"></script>

</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="nav-brand">
                <div class="logo">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>FindMySpot</span>
                </div>
            </div>
            
            <nav class="nav-menu" id="navMenu">
                <ul class="nav-list">
                    <li><a href="search.html" class="nav-link active">Search</a></li>
                    <li><a href="customer-bookings.html" class="nav-link">Bookings</a></li>
                    <li><a href="customer-profile.html" class="nav-link">Profile</a></li>
                </ul>
            </nav>
            
            <div class="nav-actions">
                <div class="role-switch">
                    <span class="role-label">Customer</span>
                    <button class="switch-btn" onclick="switchToHost()">
                        <i class="fas fa-home"></i>
                        Switch to Host
                    </button>
                </div>
                <button class="btn btn-ghost" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>
            </div>
            
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- Search Page Content -->
    <main class="search-main">
        <!-- Filters Sidebar -->
        <aside class="filters-sidebar glass" id="filtersSidebar">
            <div class="filters-header">
                <h2>Filters</h2>
                <button class="close-filters" id="closeFilters">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="filters-content">
                <!-- Search Bar -->
                <div class="filter-section">
                    <label>Location</label>
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" id="locationSearch" placeholder="Enter city or area" value="Dhaka">
                        <button class="search-btn" id="searchBtn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <!-- Date & Time -->
                <div class="filter-section">
                    <label>Date & Time</label>
                    <div class="datetime-inputs">
                        <div class="input-group">
                            <label for="startDate">Date</label>
                            <input type="date" id="startDate" class="filter-input">
                        </div>
                        <div class="input-group">
                            <label for="startTime">Start Time</label>
                            <input type="time" id="startTime" class="filter-input" value="09:00">
                        </div>
                        <div class="input-group">
                            <label for="endTime">End Time</label>
                            <input type="time" id="endTime" class="filter-input" value="17:00">
                        </div>
                    </div>
                </div>

                <!-- Price Range -->
                <div class="filter-section">
                    <label>Price Range (per hour)</label>
                    <div class="price-range-container">
                        <div class="price-inputs">
                            <input type="number" id="minPrice" placeholder="Min" value="0">
                            <span>-</span>
                            <input type="number" id="maxPrice" placeholder="Max" value="500">
                        </div>
                        <div class="price-slider">
                            <input type="range" id="priceRange" min="0" max="500" value="250">
                            <div class="price-display">Up to ৳<span id="priceValue">250</span>/hr</div>
                        </div>
                    </div>
                </div>

                <!-- Car Type -->
                <div class="filter-section">
                    <label>Car Type</label>
                    <div class="car-type-grid">
                        <button class="car-type-btn active" data-type="sedan">
                            <i class="fas fa-car"></i>
                            <span>Sedan</span>
                        </button>
                        <button class="car-type-btn" data-type="suv">
                            <i class="fas fa-truck"></i>
                            <span>SUV</span>
                        </button>
                        <button class="car-type-btn" data-type="hatchback">
                            <i class="fas fa-car-side"></i>
                            <span>Hatchback</span>
                        </button>
                        <button class="car-type-btn" data-type="minivan">
                            <i class="fas fa-shuttle-van"></i>
                            <span>Minivan</span>
                        </button>
                        <button class="car-type-btn" data-type="truck">
                            <i class="fas fa-truck-pickup"></i>
                            <span>Truck</span>
                        </button>
                    </div>
                </div>

                <!-- Amenities -->
                <div class="filter-section">
                    <label>Amenities</label>
                    <div class="amenities-list">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" name="amenities" value="covered">
                            <span class="checkmark"></span>
                            <i class="fas fa-home"></i>
                            Covered
                        </label>
                        <label class="checkbox-wrapper">
                            <input type="checkbox" name="amenities" value="security">
                            <span class="checkmark"></span>
                            <i class="fas fa-shield-alt"></i>
                            Security
                        </label>
                        <label class="checkbox-wrapper">
                            <input type="checkbox" name="amenities" value="ev-charger">
                            <span class="checkmark"></span>
                            <i class="fas fa-charging-station"></i>
                            EV Charger
                        </label>
                        <label class="checkbox-wrapper">
                            <input type="checkbox" name="amenities" value="handicap">
                            <span class="checkmark"></span>
                            <i class="fas fa-wheelchair"></i>
                            Handicap Access
                        </label>
                    </div>
                </div>

                <!-- Sort By -->
                <div class="filter-section">
                    <label for="sortBy">Sort By</label>
                    <select id="sortBy" class="filter-select">
                        <option value="distance">Distance</option>
                        <option value="price-low">Price (Low to High)</option>
                        <option value="price-high">Price (High to Low)</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>

                <!-- Reset Button -->
                <button class="reset-filters-btn" id="resetFilters">
                    <i class="fas fa-undo"></i>
                    Reset Filters
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="search-content">
            <!-- Search Header -->
            <div class="search-header">
                <button class="filters-toggle" id="filtersToggle">
                    <i class="fas fa-filter"></i>
                    Filters
                </button>
                
                <div class="view-toggle">
                    <button class="view-btn active" data-view="list">
                        <i class="fas fa-list"></i>
                        List
                    </button>
                    <button class="view-btn" data-view="grid">
                        <i class="fas fa-th"></i>
                        Grid
                    </button>
                </div>
                
                <div class="results-count">
                    <span id="resultsCount">24</span> spots found
                </div>
            </div>

            <!-- Map and Results Container -->
            <div class="map-results-container">
                <!-- Map -->
                <div class="map-container" id="mapContainer">
                    <div id="map"></div>
                    <div class="map-controls">
                        <button class="map-control-btn" id="centerMap">
                            <i class="fas fa-crosshairs"></i>
                        </button>
                        <button class="map-control-btn" id="toggleMapView">
                            <i class="fas fa-layer-group"></i>
                        </button>
                    </div>
                </div>

                <!-- Results -->
                <div class="results-container">
                    
                    <div class="results-grid" id="resultsGrid">
                        <!-- Results will be populated by JavaScript -->
                    </div>
                    
                    
                    <!-- No Results -->
                    <div class="no-results" id="noResults" style="display: none;">
                        <div class="no-results-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <h3>No parking spots found</h3>
                        <p>Try adjusting your filters or search in a different area</p>
                        <button class="btn btn-primary" onclick="resetFilters()">Reset Filters</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Searching for parking spots...</p>
        </div>
    </div>

    <!-- Google Maps API -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dO_BcqbJMmQ4Eo&callback=initMap&libraries=places"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/search.js"></script>
    <script>
  // Define utils.storage if not already defined
  const utils = window.utils || {};
  utils.storage = {
      get: (key) => {
          try {
              return JSON.parse(localStorage.getItem(key));
          } catch (e) {
              return null;
          }
      },
      set: (key, value) => {
          localStorage.setItem(key, JSON.stringify(value));
      },
      remove: (key) => {
          localStorage.removeItem(key);
      }
  };
</script>
</body>
</html>
